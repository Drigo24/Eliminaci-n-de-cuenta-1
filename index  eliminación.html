<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar cuenta - DEXA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #0f172a;
    }

    p {
      color: #475569;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      background: #2563eb;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1e40af;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Eliminar cuenta DEXA</h1>
  
  <p>
    Si deseas eliminar tu cuenta y todos tus datos asociados a DEXA,
    completa el siguiente formulario.
  </p>

  <form action="https://formspree.io/f/your-id" method="POST">
    <input type="email" name="email" placeholder="Tu correo" required>
    
    <textarea name="mensaje" placeholder="Motivo (opcional)"></textarea>

    <button type="submit">Solicitar eliminación</button>
  </form>

  <p style="margin-top:20px; font-size:12px;">
    Tus datos serán eliminados en un plazo máximo de 72 horas.
  </p>
</div>

</body>
</html>
